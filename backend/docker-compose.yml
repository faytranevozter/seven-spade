services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-5050}:5050"
    environment:
      - PORT=5050
      - GO_ENV=${GO_ENV:-production}
      - LOG_TO_STDOUT=${LOG_TO_STDOUT:-true}
      - DB_URL=mysql://${MYSQL_USER:-user}:${MYSQL_PASSWORD:-password}@mysql:3306/${MYSQL_DATABASE:-app_db}
      - USE_REDIS=${USE_REDIS:-true}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_TTL=${REDIS_TTL:-60s}
      - REDIS_KEY_PREFIX=${REDIS_KEY_PREFIX:-app:}
      - JWT_MEMBER_SECRET_KEY=${JWT_MEMBER_SECRET_KEY:?JWT_MEMBER_SECRET_KEY must be set}
      - JWT_MEMBER_TTL=${JWT_MEMBER_TTL:-60}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-app_db}
      MYSQL_USER: ${MYSQL_USER:-user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

volumes:
  mysql-data:
  redis-data:

networks:
  app-network:
    driver: bridge

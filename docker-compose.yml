services:
  postgres:
    platform: linux/amd64
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-seven_spade}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    platform: linux/amd64
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    platform: linux/amd64
    build: ./backend
    labels:
      - dev.orbstack.domains=seven-spade-backend.local
      - dev.orbstack.http-port=5050
    ports:
      - "${PORT:-5050}:5050"
    env_file:
      - .env
    environment:
      DB_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-seven_spade}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    platform: linux/amd64
    build: ./frontend
    labels:
      - dev.orbstack.domains=seven-spade-frontend.local
      - dev.orbstack.http-port=80
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
